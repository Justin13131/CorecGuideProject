<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div class="page">
    <h1>Login</h1>
</div>

<div class="form-box">
    <div class="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" />

        <p id="errorMsg" style="color:red;"></p>

        <button type="button" class="auth-btn" onclick="loginUser()">Login</button>
    </div>
</div>

<div class="auth-box compact">
    <div class="auth-switch">
        <p>Don't have an account?</p>
        <a href="createAccount.html" class="auth-btn">Create Account</a>
    </div>
</div>

<div class="back-container">
    <a href="index.html">
        <button type="button" class="gym-map-btn">Back</button>
    </a>
</div>

<script>
    function loginUser() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("errorMsg");

        errorMsg.innerText = "";

        fetch("account", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "action=login"
                + "&username=" + encodeURIComponent(username)
                + "&password=" + encodeURIComponent(password)
        })
            .then(async (response) => {
                const text = await response.text();

                if (!response.ok) {
                    throw new Error("HTTP " + response.status + ": " + text);
                }

                return text;
            })
            .then((data) => {
                if (data.trim() === "success") {
                    localStorage.setItem("username", username);
                    window.location.href = "index.html";
                } else {
                    errorMsg.innerText = data;
                }
            })
            .catch((error) => {
                console.error(error);
                errorMsg.innerText = error.message;
            });
    }
</script>
</body>
</html>
