<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym App</title>
    <link rel="stylesheet" href="css/main.css" />
</head>
<body onload="loadUser()">

<div style="width:100%; display:flex; justify-content:flex-end; padding:16px 40px; box-sizing:border-box;">
    <div style="background:#6c737c; color:white; font-size:18px; font-weight:700; padding:10px 24px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.2);">
        User: <span id="userDisplay">Guest</span>
    </div>
</div>

<div class="page">
    <div class="hero">
        <div class="hero-overlay">
            <h1>Corec Gym Menu</h1>
        </div>
    </div>

    <div class="card" style="margin-top:40px; border-radius:14px;">
        <div class="button-grid" style="display:flex; gap:16px; justify-content:center;">

            <a href="gym_map.html">
                <button class="machine-btn red">Gym Map</button>
            </a>

            <a href="machine_help.html">
                <button class="machine-btn blue">Machine Help</button>
            </a>

            <a href="gymmit.html">
                <button class="machine-btn">Gymmit</button>
            </a>

        </div>
    </div>

    <div class="auth-box">
        <div class="auth-buttons">
            <button class="auth-btn" onclick="toggleAbout()">About Us</button>
        </div>
    </div>

    <div id="aboutBox" class="about-box">
        <p>
            <strong>
                We are a team in Sprint 2026 TECH120, trying to resolve gym anxiety issue
            </strong>
        </p>
    </div>

    <div class="auth-box">
        <div class="auth-buttons">

            <a href="login.html">
                <button class="auth-btn">Login</button>
            </a>

            <a href="createAccount.html">
                <button class="auth-btn">Create Account</button>
            </a>

        </div>
    </div>

    <div class="note">Select a page</div>
</div>

<script>
    function toggleAbout() {
        const box = document.getElementById("aboutBox");
        if (box.style.display === "block") {
            box.style.display = "none";
        } else {
            box.style.display = "block";
        }
    }

    function loadUser() {
        const username = localStorage.getItem("username");
        const userDisplay = document.getElementById("userDisplay");

        if (username && username.trim() !== "") {
            userDisplay.textContent = username;
        } else {
            userDisplay.textContent = "Guest";
        }
    }
</script>

</body>
</html>
